<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Town Ranker</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #232736; --border: #2e3345;
    --text: #e4e6f0; --text-dim: #8b8fa3; --accent: #6c7bff; --accent-glow: rgba(108,123,255,0.15);
    --tier-s: #ff6b9d; --tier-a: #c084fc; --tier-b: #6c7bff; --tier-c: #38bdf8;
    --tier-d: #34d399; --tier-e: #fbbf24; --tier-f: #f87171;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .app-header { padding:24px 32px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .app-header h1 { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
  .app-header h1 span { color:var(--accent); }
  .header-actions { display:flex; gap:10px; }
  .btn { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:13px; cursor:pointer; transition:all .2s; }
  .btn:hover { background:var(--surface2); border-color:var(--accent); }
  .btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn-primary:hover { background:#5a6ae8; }
  .main { display:flex; height:calc(100vh - 73px); }
  .sidebar { width:280px; border-right:1px solid var(--border); padding:20px; overflow-y:auto; flex-shrink:0; }
  .sidebar h3 { font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin-bottom:12px; }
  .filter-group { margin-bottom:20px; }
  .filter-group label { display:flex; align-items:center; gap:8px; padding:6px 0; font-size:13px; cursor:pointer; }
  .filter-group input[type="checkbox"] { accent-color:var(--accent); }
  .weight-slider { margin-bottom:14px; }
  .weight-slider label { display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); margin-bottom:4px; }
  .weight-slider label span { color:var(--accent); font-weight:600; }
  .weight-slider input[type="range"] { width:100%; accent-color:var(--accent); }
  .content { flex:1; overflow-y:auto; padding:24px; }
  .view-toggle { display:flex; gap:4px; background:var(--surface); border-radius:8px; padding:3px; margin-bottom:20px; }
  .view-toggle button { padding:6px 14px; border:none; background:transparent; color:var(--text-dim); border-radius:6px; font-size:13px; cursor:pointer; }
  .view-toggle button.active { background:var(--accent); color:#fff; }
  .tier-section { margin-bottom:16px; }
  .tier-label { display:inline-flex; align-items:center; justify-content:center; width:44px; height:44px; border-radius:10px; font-size:20px; font-weight:800; margin-right:12px; vertical-align:middle; }
  .tier-header { display:flex; align-items:center; margin-bottom:10px; }
  .tier-header span { font-size:13px; color:var(--text-dim); }
  .tier-row { display:flex; gap:10px; flex-wrap:wrap; margin-left:56px; margin-bottom:8px; }
  .town-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 18px; cursor:pointer; transition:all .2s; min-width:180px; flex:0 0 auto; }
  .town-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 4px 20px rgba(0,0,0,.3); }
  .town-card .name { font-size:15px; font-weight:600; margin-bottom:4px; }
  .town-card .score { font-size:12px; color:var(--text-dim); }
  .town-card .mini-bars { display:flex; gap:2px; margin-top:8px; }
  .town-card .mini-bar { flex:1; height:4px; border-radius:2px; background:var(--surface2); overflow:hidden; }
  .town-card .mini-bar .fill { height:100%; border-radius:2px; }
  .table-container { overflow-x:auto; }
  table { width:100%; border-collapse:separate; border-spacing:0; font-size:13px; }
  thead th { position:sticky; top:0; background:var(--surface); padding:10px 12px; text-align:left; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--text-dim); border-bottom:1px solid var(--border); cursor:pointer; white-space:nowrap; user-select:none; }
  thead th:hover { color:var(--accent); }
  thead th.sorted { color:var(--accent); }
  tbody tr { cursor:pointer; transition:background .15s; }
  tbody tr:hover { background:var(--accent-glow); }
  tbody td { padding:10px 12px; border-bottom:1px solid var(--border); }
  .tier-badge { display:inline-flex; align-items:center; justify-content:center; width:30px; height:24px; border-radius:6px; font-size:12px; font-weight:700; }
  .cat-score-bar { display:flex; align-items:center; gap:6px; }
  .cat-score-bar .bar { width:50px; height:6px; border-radius:3px; background:var(--surface2); overflow:hidden; }
  .cat-score-bar .bar .fill { height:100%; border-radius:3px; }
  .cat-score-bar .val { font-size:11px; color:var(--text-dim); min-width:24px; }
  .detail-overlay { position:fixed; top:0; right:0; bottom:0; width:580px; background:var(--surface); border-left:1px solid var(--border); z-index:100; transform:translateX(100%); transition:transform .3s ease; overflow-y:auto; box-shadow:-10px 0 40px rgba(0,0,0,.4); }
  .detail-overlay.open { transform:translateX(0); }
  .detail-header { padding:24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; }
  .detail-header h2 { font-size:24px; font-weight:700; }
  .detail-close { background:none; border:none; color:var(--text-dim); font-size:24px; cursor:pointer; padding:4px 8px; }
  .detail-close:hover { color:var(--text); }
  .detail-body { padding:24px; }
  .detail-tier-big { font-size:48px; font-weight:800; margin-bottom:4px; }
  .detail-score-big { font-size:14px; color:var(--text-dim); margin-bottom:24px; }
  .rubric-card { background:var(--bg); border:1px solid var(--border); border-radius:10px; margin-bottom:14px; overflow:hidden; }
  .rubric-card-header { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; cursor:pointer; transition:background .15s; }
  .rubric-card-header:hover { background:var(--surface2); }
  .rubric-card-header .left { display:flex; align-items:center; gap:10px; }
  .rubric-card-header .cat-name { font-size:14px; font-weight:600; }
  .rubric-card-header .cat-weight { font-size:11px; color:var(--text-dim); background:var(--surface2); padding:2px 8px; border-radius:4px; }
  .rubric-card-header .right { display:flex; align-items:center; gap:10px; }
  .rubric-card-header .cat-score { font-size:16px; font-weight:700; }
  .rubric-card-header .expand-arrow { font-size:12px; color:var(--text-dim); transition:transform .2s; }
  .rubric-card.open .expand-arrow { transform:rotate(180deg); }
  .rubric-card-body { display:none; padding:0 16px 16px; }
  .rubric-card.open .rubric-card-body { display:block; }
  .sub-metric { margin-bottom:12px; }
  .sub-metric-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .sub-metric-name { font-size:12px; color:var(--text-dim); }
  .sub-metric-val { font-size:12px; font-weight:600; }
  .sub-metric-bar { width:100%; height:6px; border-radius:3px; background:var(--surface); overflow:hidden; }
  .sub-metric-bar .fill { height:100%; border-radius:3px; }
  .sub-metric-detail { font-size:11px; color:var(--text-dim); margin-top:3px; line-height:1.4; }
  .sub-metric-detail .raw { color:var(--accent); }
  .rubric-formula { font-size:11px; color:var(--text-dim); background:var(--surface); border-radius:6px; padding:8px 10px; margin-top:8px; font-family:'SF Mono',Monaco,Consolas,monospace; line-height:1.5; border-left:3px solid var(--accent); }
  .est-badge { display:inline-block; font-size:9px; background:#fbbf2433; color:#fbbf24; padding:1px 5px; border-radius:3px; margin-left:4px; font-weight:600; vertical-align:middle; }
  .detail-section { margin-top:24px; padding-top:20px; border-top:1px solid var(--border); }
  .detail-section h4 { font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin-bottom:12px; }
  .detail-stat { display:flex; justify-content:space-between; padding:6px 0; font-size:13px; }
  .detail-stat .label { color:var(--text-dim); }
  .detail-notes { font-size:13px; color:var(--text-dim); line-height:1.6; margin-top:8px; }
  .commute-card { background:var(--bg); border-radius:10px; padding:14px; margin-bottom:10px; }
  .commute-card .dest { font-size:13px; font-weight:600; margin-bottom:6px; }
  .commute-card .route { font-size:12px; color:var(--text-dim); line-height:1.5; }
  .commute-card .time { font-size:18px; font-weight:700; color:var(--accent); margin-top:6px; }
  .override-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .override-row label { font-size:12px; color:var(--text-dim); min-width:80px; }
  .override-row input[type="range"] { flex:1; accent-color:var(--accent); }
  .override-row .val { font-size:12px; color:var(--accent); font-weight:600; min-width:20px; text-align:right; }
  .override-btn { font-size:11px; padding:4px 10px; border-radius:4px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; }
  .override-btn:hover { border-color:var(--accent); color:var(--accent); }
  .tier-s{background:rgba(255,107,157,.15);color:var(--tier-s)}.tier-a{background:rgba(192,132,252,.15);color:var(--tier-a)}.tier-b{background:rgba(108,123,255,.15);color:var(--tier-b)}.tier-c{background:rgba(56,189,248,.15);color:var(--tier-c)}.tier-d{background:rgba(52,211,153,.15);color:var(--tier-d)}.tier-e{background:rgba(251,191,36,.15);color:var(--tier-e)}.tier-f{background:rgba(248,113,113,.15);color:var(--tier-f)}
  @media(max-width:900px){.sidebar{display:none}.detail-overlay{width:100%}}
</style>
</head>
<body>
<div class="app-header">
  <h1><span>Town</span>Ranker</h1>
  <div class="header-actions">
    <button class="btn" onclick="exportData()">Export JSON</button>
    <button class="btn btn-primary" onclick="showAddTown()">+ Add Town</button>
  </div>
</div>
<div class="main">
  <div class="sidebar">
    <div class="filter-group">
      <h3>Filter by Tier</h3>
      <label><input type="checkbox" checked data-tier="S" onchange="applyFilters()"> S Tier</label>
      <label><input type="checkbox" checked data-tier="A" onchange="applyFilters()"> A Tier</label>
      <label><input type="checkbox" checked data-tier="B" onchange="applyFilters()"> B Tier</label>
      <label><input type="checkbox" checked data-tier="C" onchange="applyFilters()"> C Tier</label>
      <label><input type="checkbox" checked data-tier="D" onchange="applyFilters()"> D Tier</label>
      <label><input type="checkbox" checked data-tier="E" onchange="applyFilters()"> E Tier</label>
      <label><input type="checkbox" checked data-tier="F" onchange="applyFilters()"> F Tier</label>
    </div>
    <div class="filter-group">
      <h3>Adjust Weights</h3>
      <div class="weight-slider"><label>Schools <span id="w-schools-val">27%</span></label><input type="range" min="0" max="50" value="27" id="w-schools" oninput="updateWeights()"></div>
      <div class="weight-slider"><label>Commute <span id="w-commute-val">27%</span></label><input type="range" min="0" max="50" value="27" id="w-commute" oninput="updateWeights()"></div>
      <div class="weight-slider"><label>Home Value <span id="w-housing-val">12%</span></label><input type="range" min="0" max="50" value="12" id="w-housing" oninput="updateWeights()"></div>
      <div class="weight-slider"><label>Political <span id="w-political-val">8%</span></label><input type="range" min="0" max="50" value="8" id="w-political" oninput="updateWeights()"></div>
      <div class="weight-slider"><label>Walkability <span id="w-walkability-val">8%</span></label><input type="range" min="0" max="50" value="8" id="w-walkability" oninput="updateWeights()"></div>
      <div class="weight-slider"><label>Food & Dining <span id="w-dining-val">8%</span></label><input type="range" min="0" max="50" value="8" id="w-dining" oninput="updateWeights()"></div>
      <div class="weight-slider"><label>Community <span id="w-community-val">5%</span></label><input type="range" min="0" max="50" value="5" id="w-community" oninput="updateWeights()"></div>
      <div class="weight-slider"><label>Safety <span id="w-safety-val">5%</span></label><input type="range" min="0" max="50" value="5" id="w-safety" oninput="updateWeights()"></div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:8px;">Total: <span id="weight-total" style="color:var(--accent);font-weight:600;">100%</span></div>
    </div>
  </div>
  <div class="content" id="content">
    <div class="view-toggle">
      <button class="active" onclick="setView('tier')">Tier List</button>
      <button onclick="setView('table')">Table</button>
    </div>
    <div id="view-container"></div>
  </div>
</div>
<div class="detail-overlay" id="detail-panel">
  <div class="detail-header">
    <div><h2 id="detail-name"></h2><div style="font-size:13px;color:var(--text-dim);" id="detail-county"></div></div>
    <button class="detail-close" onclick="closeDetail()">&times;</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script>
const CATEGORIES = ['schools','commute','housing','political','safety','walkability','dining','community'];
const CAT_LABELS = {schools:'Schools',commute:'Commute',housing:'Home Value',political:'Political Align.',safety:'Safety',walkability:'Walkability',dining:'Food & Dining',community:'Community'};

let currentView='tier', sortCol='composite', sortDir=-1;
let visibleTiers = new Set(TIER_ORDER);

/*
POLITICAL ALIGNMENT RUBRIC:
- Uses 2024 presidential Dem vote share % as primary metric
- Score formula: (demPct - 30) × 2, capped at 100

- Data marked as ESTIMATE where exact town results couldn't be sourced
  (county-level confirmed: Norfolk 61.2%, Plymouth ~55%, Bristol ~50%)
- Override any value you disagree with
*/

  {

  {
    id:'milton', name:'Milton', county:'Norfolk County', overrides:{},
    rubric: {

// ===== SCORING ENGINE =====
function calcCategoryScore(town, cat) {
  if (town.overrides[cat] !== undefined) return town.overrides[cat];
  return town.rubric[cat].submetrics.reduce((sum, s) => sum + s.score * s.weight, 0);
}
function calcComposite(town) {
  const tw = Object.values(weights).reduce((a,b)=>a+b,0);
  if (!tw) return 0;
  return Math.round(CATEGORIES.reduce((s,c) => s + calcCategoryScore(town,c)*(weights[c]/tw), 0)*10)/10;
}
function getTier(s) { return s>=78?'S':s>=72?'A':s>=66?'B':s>=60?'C':s>=54?'D':s>=48?'E':'F'; }
function getTierColor(t) { return {S:'#ff6b9d',A:'#c084fc',B:'#6c7bff',C:'#38bdf8',D:'#34d399',E:'#fbbf24',F:'#f87171'}[t]||'#888'; }
function getScoreColor(s) { return getTierColor(getTier(s)); }

// ===== RENDERING =====
function renderTierView(filtered) {
  const byTier={}; TIER_ORDER.forEach(t=>byTier[t]=[]);
  filtered.forEach(t=>byTier[getTier(calcComposite(t))].push(t));
  Object.values(byTier).forEach(a=>a.sort((x,y)=>calcComposite(y)-calcComposite(x)));
  let h='';
  for (const tier of TIER_ORDER) {
    if (!visibleTiers.has(tier)) continue;
    const a=byTier[tier], c=getTierColor(tier);
    h+=`<div class="tier-section"><div class="tier-header"><div class="tier-label" style="background:${c}22;color:${c};">${tier}</div><span>${tier==='S'?'78+':tier==='A'?'72-77':tier==='B'?'66-71':tier==='C'?'60-65':tier==='D'?'54-59':tier==='E'?'48-53':'<48'} · ${a.length} town${a.length!==1?'s':''}</span></div><div class="tier-row">`;
    if(!a.length) h+=`<div style="color:var(--text-dim);font-size:13px;padding:10px 0;">No towns</div>`;
    for (const t of a) {
      const comp=calcComposite(t);
      h+=`<div class="town-card" onclick="openDetail('${t.id}')"><div class="name">${t.name}</div><div class="score">${comp.toFixed(1)} pts</div><div class="mini-bars">`;
      for (const cat of CATEGORIES) { const s=calcCategoryScore(t,cat); h+=`<div class="mini-bar" title="${CAT_LABELS[cat]}: ${Math.round(s)}"><div class="fill" style="width:${s}%;background:${getScoreColor(s)};"></div></div>`; }
      h+=`</div></div>`;
    }
    h+=`</div></div>`;
  }
  return h;
}
function renderTableView(filtered) {
  const sorted=[...filtered].sort((a,b)=>{
    if(sortCol==='composite') return sortDir*(calcComposite(b)-calcComposite(a));
    if(sortCol==='name') return sortDir*a.name.localeCompare(b.name);
    return sortDir*(calcCategoryScore(b,sortCol)-calcCategoryScore(a,sortCol));
  });
  const ar=c=>sortCol===c?(sortDir===-1?' ▼':' ▲'):'';
  const cl=c=>sortCol===c?' class="sorted"':'';
  let h=`<div class="table-container"><table><thead><tr><th${cl('name')} onclick="sortBy('name')">Town${ar('name')}</th><th${cl('composite')} onclick="sortBy('composite')">Tier${ar('composite')}</th><th${cl('composite')} onclick="sortBy('composite')">Score${ar('composite')}</th>`;
  for (const cat of CATEGORIES) h+=`<th${cl(cat)} onclick="sortBy('${cat}')">${CAT_LABELS[cat]}${ar(cat)}</th>`;
  h+=`</tr></thead><tbody>`;
  for (const t of sorted) {
    const comp=calcComposite(t), tier=getTier(comp);
    h+=`<tr onclick="openDetail('${t.id}')"><td style="font-weight:600;">${t.name}</td><td><span class="tier-badge tier-${tier.toLowerCase()}">${tier}</span></td><td>${comp.toFixed(1)}</td>`;
    for (const cat of CATEGORIES) { const s=calcCategoryScore(t,cat); h+=`<td><div class="cat-score-bar"><div class="bar"><div class="fill" style="width:${s}%;background:${getScoreColor(s)};"></div></div><div class="val">${Math.round(s)}</div></div></td>`; }
    h+=`</tr>`;
  }
  return h+`</tbody></table></div>`;
}
function render() {
  const f=towns.filter(t=>visibleTiers.has(getTier(calcComposite(t))));
  document.getElementById('view-container').innerHTML=currentView==='tier'?renderTierView(f):renderTableView(f);
}

// ===== DETAIL PANEL =====
function openDetail(id) {
  const town=towns.find(t=>t.id===id); if(!town) return;
  const comp=calcComposite(town), tier=getTier(comp), color=getTierColor(tier), d=town.details;
  document.getElementById('detail-name').textContent=town.name;
  document.getElementById('detail-county').textContent=town.county;
  let h=`<div class="detail-tier-big" style="color:${color};">${tier}</div><div class="detail-score-big">Composite Score: ${comp.toFixed(1)} / 100</div>`;
  h+=`<div style="margin-bottom:8px;font-size:12px;color:var(--text-dim);">Click any category to see the scoring breakdown ▼</div>`;

  for (const cat of CATEGORIES) {
    const cs=calcCategoryScore(town,cat), ct=getTier(cs), cc=getTierColor(ct);
    const isOv=town.overrides[cat]!==undefined;
    const subs=town.rubric[cat].submetrics, wp=weights[cat];
    const hasEst=subs.some(s=>s.estimated);
    h+=`<div class="rubric-card" id="rubric-${town.id}-${cat}" onclick="toggleRubric('${town.id}','${cat}')">
      <div class="rubric-card-header"><div class="left">
        <span class="tier-badge tier-${ct.toLowerCase()}" style="width:26px;height:22px;font-size:11px;">${ct}</span>
        <span class="cat-name">${CAT_LABELS[cat]}</span><span class="cat-weight">${wp}%</span>
        ${isOv?'<span style="color:var(--accent);font-size:10px;">OVERRIDE</span>':''}
        ${hasEst?'<span class="est-badge">EST</span>':''}
      </div><div class="right">
        <span class="cat-score" style="color:${cc};">${Math.round(cs)}</span>
        <span class="expand-arrow">▼</span>
      </div></div><div class="rubric-card-body">`;
    for (const s of subs) {
      const sc=getScoreColor(s.score);
      h+=`<div class="sub-metric"><div class="sub-metric-header">
        <span class="sub-metric-name">${s.name} <span style="font-size:10px;">(${Math.round(s.weight*100)}%)</span>${s.estimated?'<span class="est-badge">EST</span>':''}</span>
        <span class="sub-metric-val" style="color:${sc};">${s.score}</span>
      </div><div class="sub-metric-bar"><div class="fill" style="width:${s.score}%;background:${sc};"></div></div>
      <div class="sub-metric-detail">Raw: <span class="raw">${s.raw}</span></div>
      <div class="sub-metric-detail">Formula: <code style="background:var(--surface);padding:1px 4px;border-radius:3px;">${s.formula}</code></div></div>`;
    }
    const cp=subs.map(s=>`${s.score}×${s.weight}`), cr=subs.reduce((sum,s)=>sum+s.score*s.weight,0);
    h+=`<div class="rubric-formula">${CAT_LABELS[cat]} = ${cp.join(' + ')} = <strong>${cr.toFixed(1)}</strong>${isOv?` → overridden to <strong style="color:var(--accent);">${town.overrides[cat]}</strong>`:''}</div>`;
    h+=`</div></div>`;
  }

  // Composite formula
  h+=`<div style="margin-top:16px;"><div class="rubric-formula" style="border-left-color:var(--tier-s);">Composite = `;
  h+=CATEGORIES.map(c=>`${Math.round(calcCategoryScore(town,c))}×${weights[c]}%`).join(' + ');
  h+=` = <strong style="color:${color};">${comp.toFixed(1)}</strong> → <strong style="color:${color};">${tier} Tier</strong></div></div>`;

  // Commute
  if (d&&d.commute) {
    h+=`<div class="detail-section"><h4>Commute Details</h4>`;
    h+=`<div class="commute-card"><div class="dest">→ 10 Fan Pier Blvd (Seaport)</div><div class="route">${d.commute.fanPier.mode}</div><div class="time">${d.commute.fanPier.time}</div></div>`;
    h+=`<div class="commute-card"><div class="dest">→ 960 Mass Ave (South End)</div><div class="route">${d.commute.massAve.mode}</div><div class="time">${d.commute.massAve.time}</div></div>`;
    if(d.commute.stations) h+=`<div style="font-size:12px;color:var(--text-dim);margin-top:8px;">Stations: ${Array.isArray(d.commute.stations)?d.commute.stations.join(', '):d.commute.stations}</div>`;
    if(d.commute.bonus) h+=`<div style="font-size:12px;color:var(--accent);margin-top:4px;">Bonus: ${d.commute.bonus}</div>`;
    h+=`</div>`;
  }

  // Overrides
  h+=`<div class="detail-section"><h4>Override Scores</h4><div style="font-size:12px;color:var(--text-dim);margin-bottom:12px;">Adjust any category. Overrides replace formula scores. Political scores are estimates — override if you know the real numbers.</div>`;
  for (const cat of CATEGORIES) {
    const s=calcCategoryScore(town,cat), isOv=town.overrides[cat]!==undefined;
    h+=`<div class="override-row"><label>${CAT_LABELS[cat]}</label>
      <input type="range" min="0" max="100" value="${Math.round(s)}" oninput="setOverride('${town.id}','${cat}',this.value)" id="override-${town.id}-${cat}">
      <div class="val" id="override-val-${town.id}-${cat}">${Math.round(s)}</div>
      ${isOv?`<button class="override-btn" onclick="event.stopPropagation();clearOverride('${town.id}','${cat}')">Reset</button>`:''}
    </div>`;
  }
  h+=`</div>`;

  document.getElementById('detail-body').innerHTML=h;
  document.getElementById('detail-panel').classList.add('open');
}
function toggleRubric(tid,cat){const c=document.getElementById(`rubric-${tid}-${cat}`);if(c)c.classList.toggle('open');}
function closeDetail(){document.getElementById('detail-panel').classList.remove('open');}
function setOverride(tid,cat,v){const t=towns.find(x=>x.id===tid);if(t){t.overrides[cat]=parseInt(v);document.getElementById(`override-val-${tid}-${cat}`).textContent=v;}}
function clearOverride(tid,cat){const t=towns.find(x=>x.id===tid);if(t){delete t.overrides[cat];render();openDetail(tid);}}

// ===== CONTROLS =====
function setView(v){currentView=v;document.querySelectorAll('.view-toggle button').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.view-toggle button').forEach(b=>{if(b.textContent.toLowerCase().includes(v))b.classList.add('active');});render();}
function sortBy(c){if(sortCol===c)sortDir*=-1;else{sortCol=c;sortDir=-1;}render();}
function applyFilters(){visibleTiers.clear();document.querySelectorAll('[data-tier]').forEach(cb=>{if(cb.checked)visibleTiers.add(cb.dataset.tier);});render();}
function updateWeights(){
  for(const c of CATEGORIES){const s=document.getElementById(`w-${c}`);if(s){weights[c]=parseInt(s.value);document.getElementById(`w-${c}-val`).textContent=s.value+'%';}}
  const t=Object.values(weights).reduce((a,b)=>a+b,0);const e=document.getElementById('weight-total');e.textContent=t+'%';e.style.color=t===100?'var(--accent)':'#f87171';render();
}
function exportData(){
  const d=towns.map(t=>({name:t.name,tier:getTier(calcComposite(t)),composite:calcComposite(t),categories:Object.fromEntries(CATEGORIES.map(c=>[c,{score:calcCategoryScore(t,c),submetrics:t.rubric[c].submetrics}])),overrides:{...t.overrides}}));
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='town-rankings.json';a.click();URL.revokeObjectURL(u);
}
function showAddTown(){
  const n=prompt('Town name:');if(!n)return;const id=n.toLowerCase().replace(/\s+/g,'-');
  if(towns.find(t=>t.id===id)){alert('Already exists!');return;}
  const dr={};for(const c of CATEGORIES)dr[c]={submetrics:[{name:'Score',weight:1.0,raw:'Not scored',formula:'Manual',score:50}]};
  towns.push({id,name:n,county:'TBD',overrides:{},rubric:dr,details:{commute:{fanPier:{mode:'TBD',time:'TBD'},massAve:{mode:'TBD',time:'TBD'},stations:['TBD'],line:'TBD'}}});
  render();openDetail(id);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});
document.addEventListener('click',e=>{const p=document.getElementById('detail-panel');if(p.classList.contains('open')&&!p.contains(e.target)&&!e.target.closest('.town-card')&&!e.target.closest('tr'))closeDetail();});
render();
</script>
